name: Steam Progress Update

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# Adiciona estas linhas para dar permissão de escrita ao token
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    # ... o resto do teu código continua igual daqui para baixo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install axios

      - run: node update-steam.js
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}

      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add progress.json
          git commit -m "Atualização automática Steam" || exit 0
          git push
