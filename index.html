<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogos Platinados</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:Arial, sans-serif;
}

header{
    text-align:center;
    padding:50px 20px;
    background:linear-gradient(135deg,#111827,#1e3a8a);
}

h1{
    font-size:3rem;
}

.subtitle{
    color:#cbd5e1;
    margin-top:10px;
}

.stats{
    margin-top:20px;
    font-size:1.2rem;
}

.games{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.card{
    background:#1e293b;
    border-radius:15px;
    overflow:hidden;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.game-title{
    font-size:1.4rem;
    margin-bottom:10px;
}

.platinum{
    color:#60a5fa;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:30px;
    color:#94a3b8;
}
</style>
</head>

<body>

<header>
    <h1>🏆 Jogos Platinados</h1>
    <p class="subtitle">A minha coleção de conquistas</p>

    <div class="stats">
        Platinas Totais: <strong>2</strong>
    </div>
</header>

<section class="games">

    <div class="card">
        <img src="bounty-of-one.jpg" alt="Bounty of One">
        <div class="card-content">
            <div class="game-title">Bounty of One</div>
            <div class="platinum">✅ 100/100 Troféus</div>
            <p>Primeira platina do canal.</p>
        </div>
    </div>

    <div class="card">
        <img src="jogo2.jpg" alt="Jogo 2">
        <div class="card-content">
            <div class="game-title">Nome do Jogo</div>
            <div class="platinum">✅ 100/100 Troféus</div>
            <p>Segunda platina.</p>
        </div>
    </div>

</section>

<footer>
    Twitch • Jogos Platinados Tracker
</footer>

</body>
</html>
