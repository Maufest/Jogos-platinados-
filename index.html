<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogos Platinados</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:Arial, sans-serif;
}

header{
    text-align:center;
    padding:50px 20px;
    background:linear-gradient(135deg,#111827,#1e3a8a);
}

h1{
    font-size:3rem;
}

.subtitle{
    color:#cbd5e1;
    margin-top:10px;
}

.stats{
    margin-top:20px;
    font-size:1.2rem;
}

.games{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.card{
    background:#1e293b;
    border-radius:15px;
    overflow:hidden;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:auto;
    display:block;
}

.card-content{
    padding:15px;
    text-align:center;
}

.game-title{
    font-size:1.2rem;
    font-weight:bold;
}

.platinum{
    color:#60a5fa;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:30px;
    color:#94a3b8;
}
</style>
</head>

<body>

<header>
    <h1>🏆 Jogos Platinados</h1>
    <p class="subtitle">A minha coleção de conquistas</p>

    <div class="stats">
        Platinas Totais: <strong>2</strong>
    </div>
</header>

<section style="max-width:1200px;margin:40px auto;padding:0 20px;">
    <h2 style="margin-bottom:15px;">🔴 Live Twitch</h2>

    <iframe
        src="https://player.twitch.tv/?channel=maufest25&parent=maufest.github.io"
        height="500"
        width="100%"
        allowfullscreen>
    </iframe>

    <div style="margin-top:15px;">
        <a href="https://www.twitch.tv/maufest25" target="_blank">
            <button style="
                padding:12px 24px;
                font-size:18px;
                cursor:pointer;
                border:none;
                border-radius:8px;">
                💜 Seguir na Twitch
            </button>
        </a>
    </div>
</section>
    

<section class="games">

    <div class="card">
        <img src="imagens/bounty.png" alt="Bounty of One">
        <div class="card-content">
            <div class="game-title">Bounty of One</div>
        </div>
    </div>

    <div class="card">
        <img src="imagens/detroy.png" alt="Detroit: Become Human">
        <div class="card-content">
            <div class="game-title">Detroit: Become Human</div>
        </div>
    </div>

</section>

<section style="text-align:center;padding:40px 20px;">
    <h2>🌐 Redes Sociais</h2>

    <div style="margin-top:20px;display:flex;justify-content:center;gap:20px;flex-wrap:wrap;">

        <a href="https://discord.gg/ErSSvbGZuC" target="_blank"
           style="text-decoration:none;padding:12px 20px;background:#5865F2;color:white;border-radius:8px;">
            💬 Discord
        </a>

        <a href="https://www.tiktok.com/@maufest" target="_blank"
           style="text-decoration:none;padding:12px 20px;background:#111;color:white;border-radius:8px;">
            🎵 TikTok
        </a>

        <a href="https://www.twitch.tv/maufest25" target="_blank"
           style="text-decoration:none;padding:12px 20px;background:#9146FF;color:white;border-radius:8px;">
            💜 Twitch
        </a>

    </div>
</section>
    
<footer>
    Twitch • Jogos Platinados Tracker
</footer>

</body>
</html>
