<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogos Platinados</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:Arial, sans-serif;
    top: 0 !important; /* Impede o Google de empurrar o site para baixo */
}

/* Esconde o widget feio e original do Google */
#google_translate_element, .skiptranslate, .goog-te-banner-frame {
    display: none !important;
}
body { top: 0px !important; }

header{
    text-align:center;
    padding:50px 20px;
    background:linear-gradient(135deg,#111827,#1e3a8a);
    position: relative; /* Para alinhar os botões novos no topo */
}

/* Contentor dos novos botões de idioma */
.lang-switcher {
    position: absolute;
    top: 15px;
    right: 15px;
    display: flex;
    gap: 10px;
    z-index: 1000;
}

/* Design dos novos botões modernos */
.lang-btn {
    background: #1e293b;
    color: white;
    border: 1px solid #334155;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: 0.2s;
    font-weight: bold;
}

.lang-btn:hover {
    background: #1e3a8a;
    border-color: #3b82f6;
}

h1{
    font-size:3rem;
}

.subtitle{
    color:#cbd5e1;
    margin-top:10px;
}

.stats{
    margin-top:20px;
    font-size:1.2rem;
}

.games{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.card{
    background:#1e293b;
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-5px) scale(1.02);
}

.card img{
    width:100%;
    height:auto;
    display:block;
}

.card-content{
    padding:15px;
    text-align:center;
}

.game-title{
    font-size:1.2rem;
    font-weight:bold;
}

.platinum{
    color:#60a5fa;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:30px;
    color:#94a3b8;
}
</style>
</head>
    
<body>
    
<header>
    <div id="google_translate_element"></div>

    <div class="lang-switcher">
        <button class="lang-btn" onclick="translateTo('pt')">🇵🇹 PT</button>
        <button class="lang-btn" onclick="translateTo('en')">🇬🇧 EN</button>
        <button class="lang-btn" onclick="translateTo('es')">🇪🇸 ES</button>
    </div>

    <h1>👋 Bem-vindo ao Site do Maufest25</h1>

    <p class="subtitle">
        Lives na Twitch • Platinas • Conquistas Steam
    </p>

    <div class="stats">
        🏆 Platinas Totais: <strong>2</strong>
    </div>
</header>

<section style="max-width:1200px;margin:40px auto;padding:0 20px;">
    <h2 style="margin-bottom:15px;">🔴 Live Twitch</h2>

    <iframe
        src="https://player.twitch.tv/?channel=maufest25&parent=maufest.github.io"
        height="500"
        width="100%"
        allowfullscreen>
    Platform: Twitch </iframe>

    <div style="margin-top:15px;">
        <a href="https://www.twitch.tv/maufest25" target="_blank">
        </a>
    </div>
</section>

<section class="games">

    <a href="https://store.steampowered.com/app/1968730/Bounty_of_One/" target="_blank" style="text-decoration:none;color:white;">
        <div class="card">
            <img src="imagens/bounty.png" alt="Bounty of One">
            <div class="card-content">
                <div class="game-title">Bounty of One</div>
            </div>
        </div>
    </a>

    <a href="https://store.steampowered.com/app/1222140/Detroit_Become_Human/"target="_blank"style="text-decoration:none;color:white;">
        <div class="card">
            <img src="imagens/detroy.png" alt="Detroit: Become Human">
            <div class="card-content">
                <div class="game-title">Detroit: Become Human</div>
            </div>
        </div>
    </a>

</section>

<section>
    <h2 style="text-align:center;margin-top:40px;">
        🎯 Atualmente a Platinar
    </h2>

    <div id="steam-progress" class="games">
    </div>
</section>

<section style="text-align:center;padding:40px 20px;">
    <h2>🌐 Redes Sociais</h2>

    <div style="margin-top:20px;display:flex;justify-content:center;gap:20px;flex-wrap:wrap;">

        <a href="https://discord.gg/ErSSvbGZuC" target="_blank"
           style="text-decoration:none;padding:12px 20px;background:#5865F2;color:white;border-radius:8px;">
            💬 Discord
        </a>

        <a href="https://www.tiktok.com/@maufest" target="_blank"
           style="text-decoration:none;padding:12px 20px;background:#111;color:white;border-radius:8px;">
            🎵 TikTok
        </a>

        <a href="https://www.twitch.tv/maufest25" target="_blank"
           style="text-decoration:none;padding:12px 20px;background:#9146FF;color:white;border-radius:8px;">
            💜 Twitch
        </a>

    </div>
</section>
    
<footer>
    Twitch • Jogos Platinados Tracker
</footer>
